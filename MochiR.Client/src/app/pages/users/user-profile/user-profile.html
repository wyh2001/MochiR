<div class="container mt-4">
  @if (loading()) {
    <p>Loading...</p>
  } @else if (error()) {
    <div class="alert alert-danger">
      <p>{{ error() }}</p>
      <a href="/" class="btn btn-link">Go back</a>
    </div>
  } @else if (profile(); as p) {
    <div class="card">
      <div class="card-body text-center">
        @if (p.avatarUrl) {
          <img
            [src]="p.avatarUrl"
            alt="Avatar"
            class="rounded-circle mb-3"
            width="96"
            height="96"
          />
        } @else {
          <div
            class="avatar-placeholder rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
            style="width: 96px; height: 96px; font-size: 2rem; background-color: #e9ecef"
          >
            {{ avatarInitial }}
          </div>
        }
        <h2>{{ displayName }}</h2>
        <p class="text-muted">@{{ p.userName }}</p>
        <p class="text-muted">Joined {{ p.createdAtUtc | date: 'yyyy-MM-dd' }}</p>

        <button
          class="btn btn-follow"
          [class.btn-primary]="!isFollowing()"
          [class.btn-outline-secondary]="isFollowing()"
          [disabled]="followLoading() || actionLoading()"
          (click)="onFollowToggle()"
        >
          {{ isFollowing() ? 'Unfollow' : 'Follow' }}
        </button>
      </div>
    </div>
  }
</div>
