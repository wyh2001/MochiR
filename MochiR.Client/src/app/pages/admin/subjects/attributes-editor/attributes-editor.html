<div class="mb-3">
  <span class="form-label fw-bold d-block">Attributes</span>

  @for (group of attributes().controls; track $index) {
    <div class="attribute-row row g-2 mb-2">
      <div class="col">
        <input
          type="text"
          class="form-control form-control-sm"
          placeholder="Key"
          [formControl]="ctrl(group, 'key')"
        />
      </div>
      <div class="col">
        <input
          type="text"
          class="form-control form-control-sm"
          placeholder="Value"
          [formControl]="ctrl(group, 'value')"
        />
      </div>
      <div class="col">
        <input
          type="text"
          class="form-control form-control-sm"
          placeholder="Note"
          [formControl]="ctrl(group, 'note')"
        />
      </div>
      <div class="col-auto">
        <button
          type="button"
          class="btn btn-sm btn-outline-danger btn-remove-attribute"
          (click)="removeAttribute($index)"
        >
          Remove
        </button>
      </div>
    </div>
  }

  <button
    type="button"
    class="btn btn-sm btn-outline-secondary btn-add-attribute"
    (click)="addAttribute()"
  >
    Add Attribute
  </button>
</div>
