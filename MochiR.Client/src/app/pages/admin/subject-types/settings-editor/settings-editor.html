<div class="mb-3">
  <span class="form-label fw-bold d-block">Settings</span>

  @for (group of settings().controls; track $index; let i = $index) {
    <div class="setting-row row g-2 mb-2 align-items-start">
      <div class="col-md-3">
        <input
          type="text"
          class="form-control form-control-sm"
          placeholder="Key"
          [formControl]="ctrl(group, 'key')"
          [class.is-invalid]="ctrl(group, 'key').touched && ctrl(group, 'key').invalid"
        />
        @if (ctrl(group, 'key').touched && ctrl(group, 'key').invalid) {
          <div class="invalid-feedback">Key is required.</div>
        }
      </div>
      <div class="col-md-3">
        <input
          type="text"
          class="form-control form-control-sm"
          placeholder="Value"
          [formControl]="ctrl(group, 'value')"
        />
      </div>
      <div class="col-md-4">
        <input
          type="text"
          class="form-control form-control-sm"
          placeholder="Note"
          [formControl]="ctrl(group, 'note')"
        />
      </div>
      <div class="col-md-2">
        <button
          type="button"
          class="btn btn-sm btn-outline-danger btn-remove-setting"
          (click)="removeSetting(i)"
        >
          Remove
        </button>
      </div>
    </div>
  }

  <button
    type="button"
    class="btn btn-sm btn-outline-secondary btn-add-setting"
    (click)="addSetting()"
  >
    + Add Setting
  </button>
</div>
