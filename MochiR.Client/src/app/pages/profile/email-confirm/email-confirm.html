<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-4">Confirm Email Change</h2>

      @if (submitting()) {
        <p>Confirming your email change...</p>
      }

      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }

      @if (success()) {
        <div class="alert alert-success">Your email has been updated successfully.</div>
      }

      <div class="mt-3">
        <a routerLink="/profile">Back to profile</a>
      </div>
    </div>
  </div>
</div>
