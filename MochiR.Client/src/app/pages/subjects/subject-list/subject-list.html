<div class="container mt-4">
  <h2>Subjects</h2>

  <div class="mb-3">
    <select class="form-select" (change)="onFilterChange($event)">
      <option value="">All Subject Types</option>
      @for (st of subjectTypes(); track st.id) {
        <option [value]="st.id">{{ st.displayName }}</option>
      }
    </select>
  </div>

  @if (loading()) {
    <p>Loading...</p>
  } @else if (subjects().length === 0) {
    <p>No subjects found.</p>
  } @else {
    <div class="list-group">
      @for (s of subjects(); track s.id) {
        <a [routerLink]="['/subjects', s.id]" class="list-group-item list-group-item-action">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h5 class="mb-1">{{ s.name }}</h5>
              <small class="text-muted">{{ getSubjectTypeName(s.subjectTypeId) }}</small>
            </div>
          </div>
        </a>
      }
    </div>
  }
</div>
