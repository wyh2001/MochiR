<div class="container mt-4">
  <h2>Subject Types</h2>

  @if (loading()) {
    <p>Loading...</p>
  } @else if (subjectTypes().length === 0) {
    <p>No subject types found.</p>
  } @else {
    <div class="list-group">
      @for (st of subjectTypes(); track st.id) {
        <a
          [routerLink]="['/subjects']"
          [queryParams]="{ subjectTypeId: st.id }"
          class="list-group-item list-group-item-action"
        >
          <h5 class="mb-0">{{ st.displayName }}</h5>
        </a>
      }
    </div>
  }
</div>
