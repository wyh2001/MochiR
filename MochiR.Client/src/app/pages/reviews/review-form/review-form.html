<div class="container mt-4">
  <h2>{{ isEditMode() ? 'Edit Review' : 'Create Review' }}</h2>

  @if (serverError()) {
    <div class="alert alert-danger">{{ serverError() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    @if (isEditMode()) {
      <div class="mb-3">
        <span class="form-label fw-bold">Subject</span>
        <p class="form-control-plaintext">{{ editSubjectName() || 'Unknown' }}</p>
      </div>
    } @else {
      <div class="mb-3">
        <label for="subjectId" class="form-label">Subject</label>
        <select id="subjectId" class="form-select" formControlName="subjectId">
          <option [value]="0" disabled>Select a subject</option>
          @for (s of subjects(); track s.id) {
            <option [value]="s.id">{{ s.name }}</option>
          }
        </select>
      </div>
    }

    <div class="mb-3">
      <label for="title" class="form-label">Title</label>
      <input id="title" type="text" class="form-control" formControlName="title" />
    </div>

    <div class="mb-3">
      <label for="content" class="form-label">Content</label>
      <textarea id="content" class="form-control" rows="5" formControlName="content"></textarea>
    </div>

    <div class="mb-3">
      <label for="excerpt" class="form-label">Excerpt</label>
      <input id="excerpt" type="text" class="form-control" formControlName="excerpt" />
    </div>

    <app-ratings-editor [ratings]="ratings" />

    <div class="mb-3">
      <label for="tags" class="form-label">Tags</label>
      <input
        id="tags"
        type="text"
        class="form-control"
        placeholder="Comma-separated tags"
        [value]="tagsInput()"
        (input)="tagsInput.set($any($event.target).value)"
      />
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || submitting()">
        {{ isEditMode() ? 'Save Changes' : 'Create Review' }}
      </button>
      @if (isEditMode()) {
        <a [routerLink]="['/reviews', editId]" class="btn btn-outline-secondary">Cancel</a>
      } @else {
        <a routerLink="/reviews" class="btn btn-outline-secondary">Cancel</a>
      }
    </div>
  </form>
</div>
